name: Flutter quality

on:
  push:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stereo92v3
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.2
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - run: flutter build apk --debug

  ios-build:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: stereo92v3
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.29.2
          channel: stable
          cache: true
      - run: flutter pub get
      - run: flutter build ios --debug --no-codesign
